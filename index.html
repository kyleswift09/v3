        :root {
            --bg: #f5f0eb;
            --card: rgba(255,255,255,0.75);
            --text: #2c2416;
            --text2: #6b5e4a;
            --accent: #d4a853;
            --accent2: #8b6914;
            --glass: rgba(255,255,255,0.5);
            --blur: blur(16px);
            --border: rgba(0,0,0,0.06);
            --shadow: 0 8px 32px rgba(0,0,0,0.06);
            --radius: 24px;
            --font-body: 'Inter', 'Noto Sans SC', sans-serif;
            --font-display: 'Space Grotesk', 'Noto Sans SC', sans-serif;

        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font-body);
            background: var(--bg); color: var(--text);
            line-height: 1.5; -webkit-font-smoothing: antialiased;
            background-image: radial-gradient(rgba(212,168,83,0.08) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .nav {
            position: fixed; top:0; left:0; right:0; z-index:100;
            background: var(--glass); backdrop-filter: var(--blur);
            border-bottom: 1px solid var(--border);
            padding: 0 4%; display:flex; align-items:center; justify-content:space-between;
            height: 64px;

        .nav-logo {
            display:flex; align-items:center; gap:10px; text-decoration:none; color:var(--text);

        .nav-logo span { color:var(--accent2); }
        .nav-links { display:flex; gap:6px; }
        .nav-links a {
            text-decoration:none; color:var(--text2); font-size:0.9rem; font-weight:500;
            padding:8px 16px; border-radius:40px; transition:0.2s;
        }
        .nav-links a:hover, .nav-links a.active { background:var(--accent); color:#fff; }
        .lang-btn {
            background:var(--accent); color:#fff; border:none;
            padding:8px 18px; border-radius:40px; cursor:pointer;
            font-size:0.85rem; font-weight:600; transition:0.2s;
        }
        .lang-btn:hover { background:var(--accent2); }

        .hero-carousel { padding: 90px 4% 30px; max-width:1300px; margin:0 auto; }
        .carousel-container {
            position:relative; border-radius:var(--radius); overflow:hidden;
            aspect-ratio:16/7; min-height:380px;
            box-shadow:var(--shadow); border:1px solid var(--border);
        }
        .carousel-slide {
            position:absolute; top:0; left:0; width:100%; height:100%;
            opacity:0; transition:opacity 0.7s; pointer-events:none;
            background:#e8e0d5;
            display:flex;
        }
        .carousel-slide.active { opacity:1; pointer-events:auto; }
        .carousel-slide img { object-fit:cover; display:block; }
        .slide-overlay {
            position:absolute; top:0; left:0; width:100%; height:100%;
            background:linear-gradient(to right, rgba(245,240,235,0.92) 0%, rgba(245,240,235,0.6) 35%, rgba(245,240,235,0.2) 65%, transparent 100%);
            z-index:2;
        }
        .slide-content {
            position:absolute; left:6%; top:50%; transform:translateY(-50%);
            z-index:3; max-width:45%;
        }
        .slide-tag {
            display:inline-block; padding:5px 16px;
            background:rgba(212,168,83,0.15); color:var(--accent2);
            border-radius:20px; font-size:0.75rem; font-weight:700; letter-spacing:1px;
            margin-bottom:16px;
        }
        .slide-title {
            font-family:var(--font-accent); font-size:clamp(2rem,4vw,3rem);
            font-weight:900; color:var(--text); margin-bottom:10px; line-height:1.2;white-space: nowrap;

        .slide-desc { font-size:1.05rem; color:var(--text2); margin-bottom:18px; }
        .slide-line { width:60px; height:3px; background:var(--accent); border-radius:2px; }
        .carousel-btn {
            position:absolute; top:50%; transform:translateY(-50%);
            width:44px; height:44px; border-radius:50%;
            background:rgba(255,255,255,0.7); backdrop-filter:blur(8px);
            border:1px solid var(--border); color:var(--text); font-size:1.2rem;
            cursor:pointer; z-index:10; display:flex; align-items:center; justify-content:center;
            transition:0.2s;
        }
        .carousel-btn:hover { background:var(--accent); color:#fff; }
        .carousel-btn.prev { left:14px; }
        .carousel-btn.next { right:14px; }
        .carousel-dots {
            position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
            display:flex; gap:8px; z-index:10;
        }
        .dot { width:8px; height:8px; border-radius:50%; background:#c4b998; cursor:pointer; transition:0.2s; }
        .dot.active { background:var(--accent); width:24px; border-radius:6px; }

        .section { max-width:1200px; margin:0 auto; padding:40px 4%; }
        .sec-title {

        }

        }
        .sec-title .line { flex:1; height:1px; background:var(--border); margin-left:10px; }
        .sec-title .icon { font-size:1.6rem; }

        .video-wrap {

        }
        .video-wrap video { width:100%; display:block; }

        /* 不规则卡片布局 */
        .masonry {
            display:grid;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: minmax(140px, auto);
            gap:20px;
        }
        .masonry .card {

            border:1px solid var(--border); border-radius:var(--radius);

            display:flex; flex-direction:column; justify-content:center;
        }
        .masonry .card:hover {
            transform:translateY(-4px); box-shadow:0 16px 40px rgba(0,0,0,0.08);
            border-color:var(--accent);
        }
        .masonry .card:nth-child(1) { grid-column: span 1; grid-row: span 1; }
        .masonry .card:nth-child(2) { grid-column: span 2; grid-row: span 1; }
        .masonry .card:nth-child(3) { grid-column: span 2; grid-row: span 1; }
        .masonry .card:nth-child(4) { grid-column: span 1; grid-row: span 1; }
        .masonry .card:nth-child(5) { grid-column: span 1; grid-row: span 1; }
        .masonry .card:nth-child(6) { grid-column: span 2; grid-row: span 1; }

        .arch-card h4 { font-family:var(--font-display); font-size:1rem; margin-bottom:4px; }

        }

    </style>
</head>

<script>
(function(){
    var slides=document.querySelectorAll('.carousel-slide');
    var dots=document.querySelectorAll('.dot');
    var prev=document.querySelector('.carousel-btn.prev');
    var next=document.querySelector('.carousel-btn.next');
    var idx=0,timer;
    function go(n){
        slides.forEach(function(s){s.classList.remove('active');});
        dots.forEach(function(d){d.classList.remove('active');});
        idx=(n+slides.length)%slides.length;
        slides[idx].classList.add('active');
        dots[idx].classList.add('active');
    }
    function nxt(){go(idx+1);}
    function prv(){go(idx-1);}
    function play(){clearInterval(timer);timer=setInterval(nxt,4500);}
    function stop(){clearInterval(timer);}
    slides.forEach(function(s){
        var img=s.querySelector('img');
        if(img)img.addEventListener('error',function(){this.style.display='none';});
    });
    next.addEventListener('click',function(){nxt();play();});
    prev.addEventListener('click',function(){prv();play();});
    dots.forEach(function(d){
        d.addEventListener('click',function(){
            go(parseInt(d.getAttribute('data-index')));
            play();
        });
    });
    var ct=document.querySelector('.carousel-container');
    ct.addEventListener('mouseenter',stop);
    ct.addEventListener('mouseleave',play);
    var tx=0;
    ct.addEventListener('touchstart',function(e){tx=e.changedTouches[0].screenX;stop();},{passive:true});
    ct.addEventListener('touchend',function(e){
        var t=e.changedTouches[0].screenX;
        if(t<tx-40)nxt();if(t>tx+40)prv();
        play();
    });
    play();
})();
</script>
